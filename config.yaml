port: 8003
workers: 1
log_path: /app/log/app.log
allow_cors: false
swagger_enable: false

paths:
  data_root: ""          # 批量抽取数据源，留空则默认 <项目>/data/report_new
  result_root: ""        # 抽取结果输出，留空则默认 <项目>/result
  kg_data_root: ""       # kg_data 定期报告数据源，留空则默认 <项目>/../data/kg_data/data

llm:
  default:
    api_base: "https://ark.cn-beijing.volces.com/api/v3/responses"
    api_key: ""
    model: "doubao-seed-1-6-251015"
    # model: "doubao-seed-1-8-251228"
    context_length: 16384
    context_length: 16384
  chat:
    api_base: "http://172.17.124.37:19118/v1"
    api_key: ""
    model: "qwen2-vl-72b"
    context_length: 16384
  util:
    api_base: "http://172.17.124.37:19118/v1"
    api_key: ""
    model: "qwen2-vl-72b"
    context_length: 16384
vl:
  # 单实例用 api_url；多实例负载均衡用 api_urls（轮询）
  # api_url: "http://localhost:8003/v1/chat/completions"
  api_urls:
    - url: "http://120.46.71.219:8003/v1/chat/completions"
      model: "qwen3-vl-8b"
      max_tokens: 4096   # 8b 仅 16K context，需为输入留空间
    - url: "http://120.46.71.219:8004/v1/chat/completions"
      model: "qwen3-vl-8b"
      max_tokens: 4096   # 8b 仅 16K context，需为输入留空间
    - url: "http://localhost:8003/v1/chat/completions"
      model: "Qwen/Qwen3-VL-32B-Instruct-FP8"
    - url: "http://localhost:8004/v1/chat/completions"
      model: "Qwen/Qwen3-VL-32B-Instruct-FP8"
  model: "Qwen/Qwen3-VL-32B-Instruct-FP8"   # 默认 model（当 api_urls 项未指定 model 时使用）
  context_length: 131072
  max_tokens: 16384
  max_frames: 100
  enable: true
  parallel_workers: 4   # 与 api_urls 实例数一致（4 个接口）
  max_pages: 40        # 所有模型只抽取前 40 页
  jpeg_quality: 78
  dpi: 150

